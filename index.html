<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOIDBOX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  
  <script src="https://unpkg.com/v86@latest/build/libv86.js" crossorigin="anonymous"></script>
  <style>
    

    :root {
      --page-bg: #0A0A0A;
      --text-main: #FAFAFA;
      --panel-bg: #1A1A1A;
      --text-dim: #737373;
      --brand: #FF3D00;
      --brand-text: #0A0A0A;
      --line: #262626;
      --menu-bg: #0F0F0F;
      --green: #4ADE80;
      --yellow: #FACC15;
      --red: #EF4444;

      --font-display: 'Inter Tight', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

      --sidebar-w: 220px;
      --scroll-track: #0A0A0A;
      --scroll-thumb: #FF3D00;
      --scroll-thumb-hover: #FF6A3D;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: var(--scroll-track);
    }

    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--scroll-thumb) 0%, var(--scroll-thumb-hover) 100%);
      border: 2px solid var(--scroll-track);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, var(--scroll-thumb-hover) 0%, var(--scroll-thumb) 100%);
    }

    *::-webkit-scrollbar-corner {
      background: var(--scroll-track);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text-main);
      font-family: var(--font-display);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    :focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }

    
    #app {
      display: grid;
      grid-template-rows: 52px 1fr 24px;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
      height: 100vh;
      width: 100vw;
    }

    
    #header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--page-bg);
      border-bottom: 1px solid var(--line);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--text-main);
    }

    .logo-accent {
      color: var(--brand);
    }

    .logo-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--line);
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      max-width: 560px;
      margin: 0 32px;
    }

    #github-url {
      flex: 1;
      height: 36px;
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-right: none;
      color: var(--text-main);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 0 14px;
      outline: none;
      transition: border-color 150ms;
    }

    #github-url::placeholder {
      color: var(--text-dim);
    }

    #github-url:focus {
      border-color: var(--brand);
    }

    #import-btn {
      height: 36px;
      padding: 0 20px;
      background: var(--brand);
      color: var(--brand-text);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--brand);
      cursor: pointer;
      transition: opacity 150ms;
      white-space: nowrap;
    }

    #import-btn:hover {
      opacity: 0.9;
    }

    #import-btn:active {
      transform: translateY(1px);
    }

    #import-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .h-btn {
      height: 32px;
      padding: 0 14px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .h-btn:hover {
      border-color: var(--text-main);
      color: var(--text-main);
    }

    .h-btn:active {
      transform: translateY(1px);
    }

    .h-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .h-btn.danger:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .h-btn.primary {
      border-color: var(--brand);
      color: var(--brand);
    }

    .h-btn.primary:hover {
      background: var(--brand);
      color: var(--brand-text);
    }

    
    #sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      background: var(--page-bg);
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px 14px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-title {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    
    #vm-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .vm-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      transition: all 150ms;
    }

    .vm-item:hover {
      color: var(--text-main);
    }

    .vm-item.active {
      color: var(--brand);
    }

    .vm-dot {
      width: 6px;
      height: 6px;
      flex-shrink: 0;
    }

    .vm-dot.running {
      background: var(--green);
    }

    .vm-dot.booting {
      background: var(--yellow);
      animation: pulse 1s infinite;
    }

    .vm-dot.error {
      background: var(--red);
    }

    .vm-dot.idle {
      background: var(--text-dim);
    }

    .vm-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vm-destroy {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: all 150ms;
      padding: 0 2px;
      line-height: 1;
    }

    .vm-item:hover .vm-destroy {
      opacity: 1;
    }

    .vm-destroy:hover {
      color: var(--red);
    }

    
    #file-explorer {
      flex: 1;
      overflow-y: auto;
    }

    #file-tree {
      padding: 4px 0;
    }

    .file-tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      transition: color 150ms;
      user-select: none;
    }

    .file-tree-item:hover {
      color: var(--text-main);
    }

    .file-tree-item.active {
      color: var(--brand);
    }

    .file-tree-item.is-directory {
      color: var(--text-main);
    }

    .file-tree-icon {
      font-size: 10px;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
      color: var(--text-dim);
    }

    .file-tree-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    
    .context-menu {
      position: fixed;
      z-index: 1000;
      background: var(--menu-bg);
      border: 1px solid var(--line);
      padding: 4px 0;
      min-width: 140px;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .context-menu-item {
      padding: 6px 14px;
      cursor: pointer;
      color: var(--text-main);
      transition: background 100ms;
    }

    .context-menu-item:hover {
      background: var(--brand);
      color: var(--brand-text);
    }

    
    #main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    
    #editor-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 80px;
    }

    .editor-header {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 16px;
      background: var(--page-bg);
      border-bottom: 1px solid var(--line);
    }

    .editor-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 100%;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-main);
      letter-spacing: 0.05em;
      position: relative;
    }

    .editor-tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--brand);
    }

    #code-editor {
      flex: 1;
      overflow: hidden;
    }

    #code-editor .cm-editor {
      height: 100%;
    }

    
    #panel-resizer {
      height: 1px;
      background: var(--line);
      cursor: row-resize;
      position: relative;
      flex-shrink: 0;
      transition: all 150ms;
    }

    #panel-resizer:hover,
    #panel-resizer:active {
      background: var(--brand);
      height: 2px;
    }

    
    #terminal-panel {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 80px;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 16px;
      background: var(--page-bg);
      border-bottom: 1px solid var(--line);
    }

    .terminal-title {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .terminal-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      background: var(--page-bg);
      padding: 4px 8px;
      position: relative;
    }

    #terminal-container .xterm {
      height: 100%;
    }

    #terminal-container .xterm-viewport {
      overflow-y: auto !important;
    }

    #terminal-container .terminal-bridge-wrapper {
      position: absolute;
      inset: 0;
    }

    
    #footer {
      grid-area: footer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--page-bg);
      border-top: 1px solid var(--line);
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .footer-left,
    .footer-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
    }

    #import-status {
      font-size: 9px;
      color: var(--text-dim);
      transition: color 150ms;
    }

    #import-status.success {
      color: var(--green);
    }

    #import-status.error {
      color: var(--red);
    }

    .progress-track {
      width: 80px;
      height: 2px;
      background: var(--line);
      overflow: hidden;
    }

    #import-progress {
      height: 100%;
      width: 0%;
      background: var(--brand);
      transition: width 150ms;
    }

    
    #boot-overlay {
      position: absolute;
      inset: 0;
      background: var(--page-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 300ms, visibility 300ms;
    }

    #boot-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-title {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .boot-subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .boot-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--line);
      border-top-color: var(--brand);
      animation: spin 0.6s linear infinite;
      margin-bottom: 24px;
    }

    .boot-spinner.error {
      border-top-color: var(--red);
      animation: none;
    }

    #boot-status {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-align: center;
      max-width: 400px;
      margin-bottom: 8px;
    }

    #boot-timer {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 600;
      color: var(--brand);
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .boot-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .boot-step {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.05em;
      transition: color 150ms;
    }

    .boot-step.active {
      color: var(--text-main);
    }

    .boot-step-dot {
      width: 4px;
      height: 4px;
      background: var(--line);
      transition: background 150ms;
    }

    .terminal-bridge-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }

    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    
    @media (max-width: 768px) {
      :root {
        --sidebar-w: 0px;
      }

      #sidebar {
        display: none;
      }

      .header-center {
        margin: 0 8px;
      }

      .boot-title {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    
    <header id="header">
      <div class="header-left">
        <span class="logo">VOID<span class="logo-accent">BOX</span></span>
        <span class="logo-tag">v86 / WASM</span>
      </div>
      <div class="header-center">
        <input type="text" id="github-url" placeholder="github.com/owner/repo" spellcheck="false" autocomplete="off" />
        <button id="import-btn">IMPORT</button>
      </div>
      <div class="header-right">
        <button id="snapshot-btn" class="h-btn primary" title="Save snapshot">SNAPSHOT</button>
        <button id="new-vm-btn" class="h-btn" title="New VM">+ NEW</button>
        <button id="reset-btn" class="h-btn danger" title="Reset VM">RESET</button>
      </div>
    </header>

    
    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Instances</div>
        <div id="vm-list"></div>
      </div>
      <div class="sidebar-section" id="file-explorer">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="sidebar-title" style="margin-bottom:0;">Files</div>
          <button id="refresh-files-btn" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;padding:2px 4px;transition:color 100ms;" title="Refresh file tree">&#8635;</button>
        </div>
        <div id="file-tree" style="margin-top:8px;"></div>
      </div>
    </aside>

    
    <main id="main">
      
      <div id="boot-overlay">
        <div class="boot-title">VOID<span class="logo-accent">BOX</span></div>
        <div class="boot-subtitle">x86 linux in your browser</div>
        <div class="boot-spinner"></div>
        <div id="boot-status">Preparing...</div>
        <div id="boot-timer">0.0s</div>
        <div class="boot-steps">
          <div class="boot-step"><span class="boot-step-dot"></span> Load v86 runtime</div>
          <div class="boot-step"><span class="boot-step-dot"></span> Configure VM</div>
          <div class="boot-step"><span class="boot-step-dot"></span> Boot kernel</div>
          <div class="boot-step"><span class="boot-step-dot"></span> Attach serial terminal</div>
        </div>
      </div>

      
      <div id="editor-panel">
        <div class="editor-header">
          <div class="editor-tab">
            <span id="unsaved-dot"
              style="display:none;width:6px;height:6px;background:var(--brand);flex-shrink:0;"></span>
            <span id="editor-tab-name">welcome.js</span>
          </div>
          <button id="save-btn" class="h-btn" style="height:24px;padding:0 10px;font-size:9px;margin-left:auto;"
            disabled title="Save (Ctrl+S)">SAVE</button>
        </div>
        <div id="code-editor"></div>
      </div>

      
      <div id="panel-resizer"></div>

      
      <div id="terminal-panel">
        <div class="terminal-header">
          <span class="terminal-title">Terminal</span>
          <div class="terminal-meta">
            <span id="terminal-vm-label">-</span>
            <span>Serial /dev/ttyS0</span>
            <span>v86</span>
          </div>
        </div>
        <div id="terminal-container" style="position:relative;flex:1;overflow:hidden;"></div>
      </div>
    </main>

    
    <footer id="footer">
      <div class="footer-left">
        <span><span class="status-dot"></span><span id="vm-status-text">Ready</span></span>
        <span id="import-status"></span>
        <div class="progress-track">
          <div id="import-progress"></div>
        </div>
      </div>
      <div class="footer-right">
        <span>v86 + WASM</span>
        <span>Serial TTY</span>
        <span>Browser Sandbox</span>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
